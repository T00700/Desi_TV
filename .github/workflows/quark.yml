name: quark-cookie

on:
  schedule:
    - cron: "0 * * * *"   # 每小时执行
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Request quark and store cookie
        run: |
          url="https://quark.sm.cn/s?q=%E5%88%9A%E8%80%83%E4%B8%8A985%EF%BC%8C%E7%B3%BB%E7%BB%9F%E8%AE%A9%E6%88%91%E6%B7%B7%E5%A8%B1%E4%B9%90%E5%9C%88%20libahao.com"

          curl -s \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "Accept-Language: zh-CN,zh;q=0.9" \
            -c cookie_raw.txt \
            -b cookie_raw.txt \
            "$url" > /dev/null

          echo "==== RAW COOKIE ===="
          cat cookie_raw.txt

          echo "==== BUILD REQUEST COOKIE ===="

          awk '{print $6"="$7";"}' cookie_raw.txt | tr -d '\n' > cookie.txt

          echo ""
          echo "==== FINAL COOKIE ===="
          cat cookie.txt

